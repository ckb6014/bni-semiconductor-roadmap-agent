name: Keep Render Awake

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Ping Render health endpoint
        env:
          RENDER_KEEPALIVE_URL: ${{ vars.RENDER_KEEPALIVE_URL || 'https://bni-semiconductor-roadmap-agent.onrender.com/health' }}
        run: |
          curl --fail --silent --show-error --location \
            --retry 3 \
            --retry-delay 10 \
            --max-time 60 \
            "$RENDER_KEEPALIVE_URL"
